<html lang="en">
  <head>
    <link rel="icon" type="image/png" href="/hiresnix-logo.png" />
    <!-- Preconnect for faster font load — prevents FOUT (flash of unstyled text) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <style>
      /* Fallback font stack — shows immediately before Inter loads */
      body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; }
      /* Prevent cursor text on nav links */
      a { cursor: default !important; }
      a:hover { cursor: default !important; }
    </style>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hiresnix — Elevating Talent. Empowering Futures.</title>
